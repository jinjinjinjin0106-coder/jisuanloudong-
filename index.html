<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小猴数学 · 计算漏洞诊断</title>
<style>
:root {
  --brand: #f39c12;
  --brand-dark: #e67e22;
  --g1: #27ae60; --g1-light: #d5f5e3;
  --g3: #2980b9; --g3-light: #d6eaf8;
  --g5: #8e44ad; --g5-light: #e8daef;
  --red: #c0392b; --red-light: #fadbd8;
  --teal: #16a085; --teal-light: #d1f2eb;
  --orange: #e67e22; --orange-light: #fdebd0;
  --bg: #f8f9fa;
  --card: #fff;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --border: #e8e8e8;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
}

/* Header */
.header {
  background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
  color: #fff;
  padding: 16px 20px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header .logo {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 1px;
}
.header .logo .icon { font-size: 26px; margin-right: 4px; }
.header .sub {
  font-size: 12px;
  opacity: 0.75;
  margin-top: 2px;
}

/* Tab bar */
.tabs {
  display: flex;
  background: #fff;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 82px;
  z-index: 99;
}
.tab {
  flex: 1;
  text-align: center;
  padding: 12px 8px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-light);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab.active {
  color: var(--brand-dark);
  border-bottom-color: var(--brand-dark);
}

/* Sections */
.section { display: none; padding: 16px; }
.section.active { display: block; }

/* Cards */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title .emoji { font-size: 24px; }

/* Grade selector */
.grade-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.grade-btn {
  padding: 16px 8px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  background: #fff;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 13px;
  font-weight: 600;
}
.grade-btn:hover { border-color: var(--brand); }
.grade-btn.selected { border-color: var(--brand-dark); background: #fef9e7; }
.grade-btn .grade-num { font-size: 20px; display: block; }
.grade-btn .grade-label { font-size: 11px; color: var(--text-light); display: block; margin-top: 2px; }

/* Buttons */
.btn {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.btn-primary {
  background: var(--brand);
  color: #fff;
}
.btn-primary:hover { background: var(--brand-dark); }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-outline {
  background: #fff;
  color: var(--brand-dark);
  border: 2px solid var(--brand-dark);
}
.btn-small {
  display: inline-block;
  width: auto;
  padding: 8px 16px;
  font-size: 13px;
}

/* Question */
.question-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  border-left: 4px solid var(--brand);
}
.question-card.correct { border-left-color: var(--g1); background: #f0faf4; }
.question-card.wrong { border-left-color: var(--red); background: #fef5f5; }
.question-num {
  font-size: 13px;
  font-weight: 700;
  color: var(--brand-dark);
  margin-bottom: 6px;
}
.question-text {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 10px;
}
.options { display: flex; flex-direction: column; gap: 6px; }
.option {
  padding: 10px 14px;
  border: 2px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 15px;
}
.option:hover { border-color: var(--brand); background: #fef9e7; }
.option.selected { border-color: var(--brand-dark); background: #fef9e7; font-weight: 600; }
.option.correct-answer { border-color: var(--g1); background: #d5f5e3; }
.option.wrong-answer { border-color: var(--red); background: #fadbd8; }
.feedback {
  margin-top: 8px;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  display: none;
}
.feedback.show { display: block; }
.feedback.correct { background: #d5f5e3; color: #1e8449; }
.feedback.wrong { background: #fadbd8; color: #922b21; }

/* Error checklist */
.error-category {
  margin-bottom: 16px;
}
.cat-header {
  padding: 10px 12px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.cat-header .count { font-size: 12px; font-weight: 400; }
.cat-items { padding-left: 8px; }
.cat-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 10px;
  margin: 4px 0;
  border-radius: 6px;
  background: #fff;
  border: 1px solid var(--border);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.cat-item:hover { background: #f8f9fa; }
.cat-item.checked { background: #fef9e7; border-color: var(--brand); }
.cat-item input[type=checkbox] {
  margin-top: 2px;
  width: 16px;
  height: 16px;
  accent-color: var(--brand-dark);
  flex-shrink: 0;
}
.cat-item .item-code {
  font-weight: 700;
  font-size: 12px;
  color: var(--brand-dark);
  min-width: 28px;
}

/* Report */
.report { display: none; }
.report.show { display: block; }
.report-header {
  text-align: center;
  padding: 24px 16px;
  background: linear-gradient(135deg, #fef9e7 0%, #fdebd0 100%);
  border-radius: var(--radius);
  margin-bottom: 16px;
}
.report-score {
  font-size: 48px;
  font-weight: 800;
  color: var(--brand-dark);
}
.report-grade {
  font-size: 14px;
  color: var(--text-light);
  margin-top: 4px;
}
.weakness-list { margin-top: 12px; }
.weakness-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  margin: 6px 0;
  background: #fef5f5;
  border-radius: 8px;
  border-left: 4px solid var(--red);
  font-size: 14px;
}
.weakness-item .severity {
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 10px;
  color: #fff;
  font-weight: 600;
  white-space: nowrap;
}
.severity-high { background: var(--red); }
.severity-mid { background: var(--orange); }
.severity-low { background: var(--teal); }

/* Radar */
.radar-container {
  text-align: center;
  margin: 16px 0;
}
.radar-container canvas {
  max-width: 100%;
  height: auto;
}

/* CTA */
.cta-card {
  text-align: center;
  padding: 24px 16px;
  background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
  color: #fff;
  border-radius: var(--radius);
  margin: 16px 0;
}
.cta-card h3 { font-size: 18px; margin-bottom: 8px; }
.cta-card p { font-size: 13px; opacity: 0.85; margin-bottom: 16px; }
.cta-card .wechat-id {
  display: inline-block;
  padding: 10px 24px;
  background: #fff;
  color: var(--text);
  border-radius: 8px;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1px;
  margin: 8px 0;
}
.copy-btn {
  display: inline-block;
  padding: 6px 16px;
  background: var(--brand);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  margin-top: 4px;
}

/* Footer */
.footer {
  text-align: center;
  padding: 24px 16px;
  color: var(--text-light);
  font-size: 12px;
  border-top: 1px solid var(--border);
  margin-top: 24px;
}

/* Toast */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 999;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* Knowledge point selector */
.kp-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.kp-tag {
  padding: 6px 14px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.kp-tag:hover { border-color: var(--brand); }
.kp-tag.selected { background: var(--brand); color: #fff; border-color: var(--brand); }

/* Progress bar */
.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  margin: 12px 0;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--brand);
  border-radius: 3px;
  transition: width 0.3s;
}

/* Step indicator */
.steps {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 16px;
}
.step-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--border);
}
.step-dot.active { background: var(--brand); }
.step-dot.done { background: var(--g1); }

.hidden { display: none !important; }


/* Print */
@media print {
  body { background: #fff; max-width: 100%; }
  .header, .tabs, #mainTabs, .step-indicator, .cta-card, .copy-btn, .save-btn-area,
  .grade-selector, .kp-grid, .action-buttons, .footer, .toast, button, .btn {
    display: none !important;
  }
  .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
  .section { display: block !important; }
  .section.active { display: block !important; }
  .report-header { text-align: center; margin-bottom: 16px; }
  .report-header h2 { font-size: 20px; }
  @page { margin: 12mm; size: A4; }
}

</style>
</head>

<!-- Header -->
<div class="header">

</div>

<!-- Tabs -->
<div class="tabs" id="mainTabs">

  <div class="tab" data-tab="detailed">🔍 详细诊断</div>
</div>

<!-- ==================== QUICK DIAGNOSIS ==================== -->
<div class="section active" id="section-quick">

  <!-- Step 1: Select Grade -->
  <div id="quick-step1">
    <div class="card">
      <div class="card-title"><span class="emoji">📚</span>选择孩子所在年级</div>

          <span class="grade-num">1-2</span>
          <span class="grade-label">一二年级</span>
        </div>
        <div class="grade-btn" data-grade="g34">

        </div>

          <span class="grade-num">5-6</span>
          <span class="grade-label">五六年级</span>
        </div>
      </div>

    </div>
  </div>

  <!-- Step 2: Questions -->
  <div id="quick-step2" class="hidden">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-weight:700;" id="quickProgressLabel">第 1/10 题</span>
        <span style="font-size:12px;color:var(--text-light);" id="quickGradeLabel"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="quickProgressBar" style="width:0%"></div></div>
    </div>
    <div id="questionContainer"></div>
    <div style="display:flex;gap:10px;margin-top:12px;">
      <button class="btn btn-outline btn-small hidden" id="prevQBtn" style="flex:1;">上一题</button>
      <button class="btn btn-primary btn-small hidden" id="nextQBtn" style="flex:1;">下一题</button>
    </div>
    <button class="btn btn-primary hidden" id="submitQuickBtn" style="margin-top:12px;">查看诊断报告</button>
  </div>

  <!-- Step 3: Report -->
  <div id="quick-step3" class="hidden">
    <div id="quickReportContainer"></div>
  </div>
</div>

<!-- ==================== DETAILED DIAGNOSIS ==================== -->
<div class="section" id="section-detailed">

  <!-- Step 1: Select grade + knowledge point -->
  <div id="detail-step1">
    <div class="card">
      <div class="card-title"><span class="emoji">🎯</span>第一步：选择年级</div>
      <div class="grade-grid" id="detailGradeGrid">
        <div class="grade-btn" data-grade="g12">
          <span class="grade-num">1-2</span>
          <span class="grade-label">一二年级</span>
        </div>
        <div class="grade-btn" data-grade="g34">
          <span class="grade-num">3-4</span>
          <span class="grade-label">三四年级</span>
        </div>
        <div class="grade-btn" data-grade="g56">
          <span class="grade-num">5-6</span>
          <span class="grade-label">五六年级</span>
        </div>
      </div>
    </div>

    <div class="card hidden" id="detailKPContainer">
      <div class="card-title"><span class="emoji">📋</span>第二步：选择知识点（可多选）</div>
      <div class="kp-grid" id="kpGrid"></div>
    </div>
  </div>

  <!-- Step 2: Checklist -->
  <div id="detail-step2" class="hidden">
    <div class="card">
      <div class="card-title"><span class="emoji">✅</span>勾选孩子常犯的错因</div>
      <p style="font-size:13px;color:var(--text-light);margin-bottom:12px;">
        请根据孩子近期练习情况，逐条勾选。不确定的可先跳过。
      </p>
      <div id="errorChecklist"></div>
      <button class="btn btn-primary" id="detailSubmitBtn" style="margin-top:16px;">生成诊断报告</button>
    </div>
  </div>

  <!-- Step 3: Report -->
  <div id="detail-step3" class="hidden">
    <div id="detailReportContainer"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Footer -->
<div class="footer">
  🐵 小猴数学工作室<br>
  专注小学数学错因分析与精准提分
</div>

let state = {

function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function showToast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('已复制！去微信添加好友'));
  } else {
    showToast('请手动复制：' + text);
  }
}

$('#mainTabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  const tabId = tab.dataset.tab;
  state.tab = tabId;
  $$('#mainTabs .tab').forEach(t => t.classList.remove('active'));

  $(`#section-${tabId}`).classList.add('active');
  if (tabId === 'detailed' && !state.detail.grade) {
    // reset detail step display
    $('#detail-step1').classList.remove('hidden');

// Grade selector
$('#quickGradeGrid').addEventListener('click', (e) => {
  const btn = e.target.closest('.grade-btn');
  if (!btn) return;
  $$('#quickGradeGrid .grade-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.quick.grade = btn.dataset.grade;
  $('#quickStartBtn').disabled = false;
});

$('#quickStartBtn').addEventListener('click', () => {
  if (!state.quick.grade) return;
  state.quick.currentQ = 0;
  state.quick.answers = {}; // { scenarioIndex: errorCode or '_none' }
  state.quick.submitted = false;
  $('#quick-step1').classList.add('hidden');
  $('#quick-step2').classList.remove('hidden');
  $('#quick-step3').classList.add('hidden');
  $('#quickGradeLabel').textContent = ERROR_DATA[state.quick.grade].label;
  renderQuickScenario();
});

// Render current scenario card
function renderQuickScenario() {
  const scenarios = QUICK_SCENARIOS[state.quick.grade];
  const i = state.quick.currentQ;
  const sc = scenarios[i];
  const total = scenarios.length;

  $('#quickProgressLabel').textContent = `第 ${i+1}/${total} 个场景`;
  $('#quickProgressBar').style.width = `${((i+1)/total)*100}%`;

  const selected = state.quick.answers[i];

  let html = `<div class="question-card">`;
  html += `<div class="question-num">场景 ${i+1} · ${sc.cat}类错因</div>`;
  html += `<div class="question-text">${sc.scenario}</div>`;
  html += `<div style="font-size:12px;color:var(--text-light);margin-bottom:10px;">💡 ${sc.hint}</div>`;
  html += `<div class="options">`;
  sc.options.forEach((opt, oi) => {
    let cls = 'option';
    if (selected === opt.code) cls += ' selected';
    if (opt.code === '_none') cls += ' option-none';
    html += `<div class="${cls}" data-code="${opt.code}" style="${opt.code === '_none' ? 'border-style:dashed;' : ''}">${opt.text}</div>`;
  });
  html += `</div>`;
  html += `</div>`;

  $('#questionContainer').innerHTML = html;

  // Bind option clicks
  $$('#questionContainer .option').forEach(opt => {
    opt.addEventListener('click', function() {
      const code = this.dataset.code;
      state.quick.answers[i] = code;
      renderQuickScenario();
      updateQuickNav();
    });
  });

  updateQuickNav();
}

function updateQuickNav() {
  const total = QUICK_SCENARIOS[state.quick.grade].length;
  const i = state.quick.currentQ;
  const answered = Object.keys(state.quick.answers).length;

  $('#prevQBtn').classList.toggle('hidden', i === 0);
  // Allow next even if not answered (but submit only if all done)
  const allDone = answered === total;
  $('#nextQBtn').classList.toggle('hidden', i === total - 1);
  $('#submitQuickBtn').classList.toggle('hidden', !allDone);
  $('#submitQuickBtn').textContent = `查看诊断报告（${answered}/${total} 场景已完成）`;
  if (!allDone && answered > 0) {
    $('#submitQuickBtn').classList.remove('hidden');
    $('#submitQuickBtn').disabled = false;
    $('#submitQuickBtn').style.opacity = '0.7';
  } else if (allDone) {
    $('#submitQuickBtn').style.opacity = '1';
    $('#submitQuickBtn').disabled = false;
  }
}

$('#prevQBtn').addEventListener('click', () => {
  if (state.quick.currentQ > 0) {
    state.quick.currentQ--;
    renderQuickScenario();
  }
});

$('#nextQBtn').addEventListener('click', () => {
  const total = QUICK_SCENARIOS[state.quick.grade].length;
  if (state.quick.currentQ < total - 1) {
    state.quick.currentQ++;
    renderQuickScenario();
  }
});

$('#submitQuickBtn').addEventListener('click', () => {
  state.quick.submitted = true;
  $('#quick-step2').classList.add('hidden');
  $('#quick-step3').classList.remove('hidden');
  renderQuickReport();
});

// Quick report — direct error attribution
function renderQuickReport() {
  const scenarios = QUICK_SCENARIOS[state.quick.grade];
  const gradeData = ERROR_DATA[state.quick.grade];
  const cats = gradeData.categories;
  const total = scenarios.length;

  // Collect selected errors (exclude '_none')
  const selectedErrors = []; // { code, cat, scenario, catTitle, impact }
  const impactList = []; // { cat, catTitle, impact }
  let cleanCount = 0;

  scenarios.forEach((sc, i) => {
    const code = state.quick.answers[i];
    if (code && code !== '_none') {
      let fullName = '';
      Object.values(cats).forEach(cat => {
        const found = cat.items.find(it => it.code === code);
        if (found) fullName = found.name;
      });
      selectedErrors.push({
        code,
        cat: sc.cat,
        catTitle: cats[sc.cat]?.title || sc.cat,
        catColor: cats[sc.cat]?.color || '#333',
        scenario: sc.scenario,
        fullName,
      });
      // Collect unique impact per category
      if (sc.impact && !impactList.find(imp => imp.cat === sc.cat)) {
        impactList.push({
          cat: sc.cat,
          catTitle: cats[sc.cat]?.title || sc.cat,
          catColor: cats[sc.cat]?.color || '#333',
          impact: sc.impact,
        });
      }
    } else if (code === '_none') {
      cleanCount++;
    }
  });

  const problemCount = selectedErrors.length;
  const gradeLabel = gradeData.label;

  // Group by category
  const byCat = {};
  selectedErrors.forEach(e => {
    if (!byCat[e.cat]) byCat[e.cat] = { catTitle: e.catTitle, catColor: e.catColor, errors: [] };
    byCat[e.cat].errors.push(e);
  });

  // ===== 生成总体评价 =====
  const nextGrade = { g12: '三四年级', g34: '五六年级', g56: '初中' };
  const nextLabel = nextGrade[state.quick.grade];
  let overallTitle, overallText, overallAdvice;
  if (problemCount === 0) {
    overallTitle = `${gradeLabel}计算基础扎实，${cleanCount}个场景全部过关`;
    overallText = `孩子在${gradeLabel}阶段的各项计算基本功没有明显漏洞。口算、进退位、书写习惯等核心环节表现稳定，为后续学习打下了好底子。`;
    overallAdvice = `保持现有节奏，继续日常计算练习即可。进入${nextLabel}后，新知识可以平稳衔接。`;
  } else if (problemCount <= 2) {
    overallTitle = `计算底子不错，有${problemCount}个小漏洞，补上就完事`;
    overallText = `孩子在大多数计算环节表现正常，漏洞集中在少数几个点上。这种「局部薄弱」最好解决——精准打击，不用全面返工。`;
    overallAdvice = `趁漏洞还小、影响还没扩散，现在每周花10分钟专项练习，${problemCount}周就能补齐。进入${nextLabel}后不至于因为这些漏洞拖后腿。`;
  } else if (problemCount <= 5) {
    overallTitle = `计算有${problemCount}处漏洞，分布较广，需要系统梳理`;
    overallText = `孩子的漏洞跨了${Object.keys(byCat).length}个知识类别，不是某一个环节的问题，而是多个关节都有松动。漏洞多但每个都不难补——怕的是放着不管。`;
    overallAdvice = `建议按「基础→进阶」的顺序逐个击破，预计${Math.round(problemCount*2)}周系统梳理可以大幅改善。如果不补，进入${nextLabel}后这些漏洞会被新知识放大，到时补起来代价翻倍。`;
  } else {
    overallTitle = `计算根基有多处松动，需要从根上排查`;
    overallText = `${problemCount}个场景发现漏洞，仅${cleanCount}个正常。问题不是某一个知识点没学好，而是计算链条的多个环节同时薄弱——这说明地基阶段可能就留下了窟窿，一路带到了现在。`;
    overallAdvice = `现在是最佳修补窗口。${gradeLabel}是进入${nextLabel}前最后的整块修补时间——建议从最基础的A类错因开始，逐类攻克。如果带着这些漏洞进${nextLabel}，不是在沙子上盖楼，是在沼泽上盖楼。`;
  }

  let reportHTML = `
    <div class="report show">
      <div class="report-header">
        <div style="font-size:13px;color:var(--text-light);">${gradeLabel} · 计算漏洞诊断报告</div>
        <div style="font-size:15px;font-weight:700;margin-top:6px;line-height:1.5;">${overallTitle}</div>
        <div style="font-size:13px;color:var(--text);margin-top:8px;line-height:1.7;">${overallText}</div>
        <div style="font-size:12px;color:var(--brand-dark);margin-top:6px;line-height:1.7;background:#fff;padding:8px 12px;border-radius:6px;">📌 ${overallAdvice}</div>
      </div>

      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <div style="flex:1;text-align:center;background:#fff;border-radius:8px;padding:12px 8px;box-shadow:0 1px 4px rgba(0,0,0,0.04);">
          <div style="font-size:24px;font-weight:800;color:${problemCount===0?'#27ae60':problemCount<=2?'#e67e22':problemCount<=5?'#e67e22':'#c0392b'};">${problemCount}</div>
          <div style="font-size:11px;color:var(--text-light);">个漏洞</div>
        </div>
        <div style="flex:1;text-align:center;background:#fff;border-radius:8px;padding:12px 8px;box-shadow:0 1px 4px rgba(0,0,0,0.04);">
          <div style="font-size:24px;font-weight:800;color:#27ae60;">${cleanCount}</div>
          <div style="font-size:11px;color:var(--text-light);">个场景正常</div>
        </div>
        <div style="flex:1;text-align:center;background:#fff;border-radius:8px;padding:12px 8px;box-shadow:0 1px 4px rgba(0,0,0,0.04);">
          <div style="font-size:24px;font-weight:800;color:#2980b9;">${total}</div>
          <div style="font-size:11px;color:var(--text-light);">共诊断</div>
        </div>
      </div>`;

  if (problemCount > 0) {
    // Part 1: Error details
    reportHTML += `
      <div class="card">
        <div class="card-title"><span class="emoji">🎯</span>漏洞详情</div>`;

    Object.entries(byCat).forEach(([catKey, group]) => {
      reportHTML += `
        <div style="margin-bottom:14px;">
          <div style="font-weight:700;font-size:14px;color:${group.catColor};margin-bottom:6px;">
            ${group.catTitle}（${group.errors.length}条）
          </div>`;
      group.errors.forEach(e => {
        const sev = e.cat === 'A' || e.cat === 'B' || e.cat === 'C' ? 'high' : 'mid';
        reportHTML += `
          <div class="weakness-item">
            <span class="severity severity-${sev}">${sev === 'high' ? '优先' : '关注'}</span>
            <span><strong>${e.code}</strong> ${e.fullName || e.code}</span>
          </div>`;
      });
      reportHTML += `</div>`;
    });

    reportHTML += `</div>`;

    // Part 2: Impact chain analysis (影响链)
    if (impactList.length > 0) {
      reportHTML += `
      <div class="card">
        <div class="card-title"><span class="emoji">🔗</span>影响链分析：不补上会怎样？</div>
        <p style="font-size:13px;color:var(--text-light);margin-bottom:12px;">
          计算漏洞不是孤立的——低年级的一个小漏洞，会像滚雪球一样影响后续所有相关知识点。以下是针对你孩子当前漏洞的<b>影响预警</b>：
        </p>`;

      impactList.forEach(imp => {
        reportHTML += `
        <div style="margin-bottom:14px;padding:12px;background:${imp.catColor}10;border-radius:8px;border-left:4px solid ${imp.catColor};">
          <div style="font-weight:700;font-size:13px;color:${imp.catColor};margin-bottom:4px;">
            ${imp.catTitle}
          </div>
          <div style="font-size:13px;line-height:1.7;">${imp.impact}</div>
        </div>`;
      });

      reportHTML += `
        <div style="margin-top:12px;padding:10px;background:#fef9e7;border-radius:8px;font-size:12px;color:#7d6608;">
          💡 <b>关键认知：</b>小学数学知识是<b>链式结构</b>——前面的漏洞不会自动消失，而是会被后续知识"放大"。一二年级一个退位小漏洞，到了五六年级可能演变成分数计算大面积丢分。趁现在补上，代价最小。
        </div>
      </div>`;
    }

    // Part 3: Action advice
    reportHTML += `
      <div class="card">
        <div class="card-title"><span class="emoji">💡</span>下一步行动建议</div>
        <ol style="padding-left:20px;font-size:14px;line-height:2.2;">`;

    if (problemCount >= 3) {
      reportHTML += `<li>先从<strong>基础类（A类）</strong>错因开始攻克——地基不牢，上层全晃</li>`;
      reportHTML += `<li>每攻克一条错因，在《错因频率统计表》上追踪3天确认不再犯</li>`;
    }
    reportHTML += `
          <li>对照《家长指导手册》中对应编号，查看<b>正确做法</b>和<b>自我提醒语</b></li>
          <li>同类题目每天练5道，用<b>专项练习</b>巩固，直到连续3次全对</li>
          <li>两周后重新诊断一次，追踪漏洞修复进度</li>
        </ol>
      </div>`;
  } else {
    reportHTML += `
      <div class="card" style="text-align:center;">
        <div class="card-title"><span class="emoji">🌟</span>太棒了！</div>
        <p style="font-size:15px;">在所有诊断场景中，孩子都没有出现常见的计算漏洞。</p>
        <p style="font-size:13px;color:var(--text-light);">建议继续保持日常计算练习，也可以切换到「详细诊断」逐条检查确保没有遗漏。</p>
        <button class="btn btn-outline btn-small" onclick="switchToDetailed()" style="margin-top:12px;">🔍 切换到详细诊断</button>

  }

  // CTA
  reportHTML += `

      <div class="wechat-id">UFOceocoo</div>

      <button class="btn btn-outline btn-small" onclick="switchToDetailed()" style="margin-top:8px;">🔍 切换到详细诊断</button>

  $('#quickReportContainer').innerHTML = reportHTML;

$('#detailGradeGrid').addEventListener('click', (e) => {
  const btn = e.target.closest('.grade-btn');
  if (!btn) return;
  $$('#detailGradeGrid .grade-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.detail.grade = btn.dataset.grade;
  state.detail.selectedKPs = [];
  state.detail.checkedItems = {};
  renderDetailKP();
  $('#detailKPContainer').classList.remove('hidden');
  $('#detail-step2').classList.add('hidden');
  $('#detail-step3').classList.add('hidden');
});

function renderDetailKP() {
  const kps = ERROR_DATA[state.detail.grade].kpList;
  let html = kps.map(kp =>
    `<div class="kp-tag" data-kp="${kp.id}">${kp.name}</div>`
  ).join('');
  $('#kpGrid').innerHTML = html;

  $$('#kpGrid .kp-tag').forEach(tag => {
    tag.addEventListener('click', function() {
      const kpId = this.dataset.kp;
      if (state.detail.selectedKPs.includes(kpId)) {
        state.detail.selectedKPs = state.detail.selectedKPs.filter(k => k !== kpId);
        this.classList.remove('selected');
      } else {
        state.detail.selectedKPs.push(kpId);
        this.classList.add('selected');
      }
      if (state.detail.selectedKPs.length > 0) {
        renderDetailChecklist();
        $('#detail-step2').classList.remove('hidden');
      } else {
        $('#detail-step2').classList.add('hidden');
      }
    });
  });
}

function renderDetailChecklist() {
  const cats = ERROR_DATA[state.detail.grade].categories;
  let html = '';

  Object.entries(cats).forEach(([key, cat]) => {
    const checked = cat.items.filter(it => state.detail.checkedItems[it.code]).length;
    html += `
      <div class="error-category">
        <div class="cat-header" style="background:${cat.lightColor};color:#2c3e50;" data-cat="${key}">
          <span>${cat.title}</span>
          <span class="count">${checked}/${cat.items.length}</span>
        </div>
        <div class="cat-items" id="cat-items-${key}">`;
    cat.items.forEach(item => {
      const isChecked = state.detail.checkedItems[item.code] || false;
      html += `
        <div class="cat-item${isChecked ? ' checked' : ''}" data-code="${item.code}">
          <input type="checkbox" ${isChecked ? 'checked' : ''} id="chk-${item.code}">
          <span class="item-code">${item.code}</span>
          <span>${item.name}</span>
        </div>`;
    });
    html += `</div></div>`;
  });

  $('#errorChecklist').innerHTML = html;

  // Bind checkbox clicks
  $$('#errorChecklist .cat-item').forEach(item => {
    item.addEventListener('click', function(e) {
      if (e.target.tagName === 'INPUT') return; // let checkbox handle itself
      const code = this.dataset.code;
      const chk = $(`#chk-${code}`);
      chk.checked = !chk.checked;
      state.detail.checkedItems[code] = chk.checked;
      if (!chk.checked) delete state.detail.checkedItems[code];
      this.classList.toggle('checked', chk.checked);
      // Update category count
      updateCatCounts();
    });
  });

  // Also bind checkbox change directly
  $$('#errorChecklist input[type=checkbox]').forEach(chk => {
    chk.addEventListener('change', function() {
      const code = this.id.replace('chk-', '');
      state.detail.checkedItems[code] = this.checked;
      if (!this.checked) delete state.detail.checkedItems[code];
      this.closest('.cat-item').classList.toggle('checked', this.checked);
      updateCatCounts();
    });
  });
}

function updateCatCounts() {
  const cats = ERROR_DATA[state.detail.grade].categories;
  Object.entries(cats).forEach(([key, cat]) => {
    const checked = cat.items.filter(it => state.detail.checkedItems[it.code]).length;
    const header = document.querySelector(`.cat-header[data-cat="${key}"] .count`);
    if (header) header.textContent = `${checked}/${cat.items.length}`;
  });
}

$('#detailSubmitBtn').addEventListener('click', () => {
  const checkedCount = Object.keys(state.detail.checkedItems).length;
  if (checkedCount === 0) {
    showToast('请至少勾选一条错因');
    return;
  }
  $('#detail-step1').classList.add('hidden');
  $('#detailKPContainer').classList.add('hidden');
  $('#detail-step2').classList.add('hidden');
  $('#detail-step3').classList.remove('hidden');
  renderDetailReport();
});

function renderDetailReport() {
  const gradeData = ERROR_DATA[state.detail.grade];
  const cats = gradeData.categories;
  const checkedItems = state.detail.checkedItems;

  // Group by category
  const catBreakdown = {};
  Object.entries(cats).forEach(([catKey, cat]) => {
    const items = cat.items.filter(it => checkedItems[it.code]);
    if (items.length > 0) {
      catBreakdown[catKey] = { cat, items };
    }
  });

  const totalChecked = Object.keys(checkedItems).length;
  const totalItems = Object.values(cats).reduce((s, c) => s + c.items.length, 0);

  let reportHTML = `
    <div class="report show">
      <div class="report-header">
        <div style="font-size:14px;color:var(--text-light);">${gradeData.label} · 详细漏洞诊断</div>
        <div class="report-score">${totalChecked}</div>
        <div style="font-size:14px;">条已识别漏洞 / 共 ${totalItems} 条</div>
        <div style="font-size:12px;color:var(--text-light);margin-top:4px;">${
          totalChecked <= 3 ? '🟢 漏洞较少，针对性巩固即可' :
          totalChecked <= 8 ? '🟡 存在多个薄弱点，建议系统梳理' :
          '🔴 漏洞较多，需要从基础开始系统排查'
        }</div>
      </div>

      <div class="card">
        <div class="card-title"><span class="emoji">📊</span>漏洞分类汇总</div>`;

  Object.entries(catBreakdown).forEach(([catKey, { cat, items }]) => {
    reportHTML += `
      <div style="margin-bottom:16px;">
        <div style="font-weight:700;font-size:14px;color:${cat.color};margin-bottom:6px;">
          ${cat.title}（${items.length}条）
        </div>
        <div style="font-size:12px;color:var(--text-light);margin-bottom:4px;">${cat.desc}</div>`;
    items.forEach(item => {
      reportHTML += `
        <div class="weakness-item">
          <span class="severity severity-mid">待攻破</span>
          <span><strong>${item.code}</strong> ${item.name}</span>
        </div>`;
    });
    reportHTML += `</div>`;
  });

  reportHTML += `</div>`;

  // Advice
  const topCats = Object.entries(catBreakdown)
    .sort((a, b) => b[1].items.length - a[1].items.length)
    .slice(0, 3);

  if (topCats.length > 0) {
    reportHTML += `
      <div class="card">
        <div class="card-title"><span class="emoji">💡</span>优先攻克建议</div>
        <p style="font-size:14px;margin-bottom:12px;">根据你的勾选，建议按以下顺序逐个击破：</p>
        <ol style="padding-left:20px;font-size:14px;line-height:2;">`;
    topCats.forEach(([catKey, { cat, items }]) => {
      reportHTML += `<li><strong>${cat.title}</strong>：先解决这 ${items.length} 条，它们是${cat.desc}的核心</li>`;
    });
    reportHTML += `
        </ol>
        <p style="font-size:12px;color:var(--text-light);margin-top:12px;">
          每攻克一条，在《错因频率统计表》上打⭐。坚持3周，漏洞数量可减少70%以上。
        </p>
      </div>`;
  }

  // Save button
  reportHTML += `
    <div style="text-align:center;margin:12px 0;" class="save-btn-area">
      <button class="btn" onclick="window.print()" style="font-size:15px;padding:12px 32px;">📥 保存 / 打印报告</button>
      <p style="font-size:11px;color:var(--text-light);margin-top:4px;">保存到手机或连接打印机</p>
    </div>`;

  // CTA
  reportHTML += `
    <div class="cta-card">
      <h3>📋 一周针对性练习（带答案）</h3>
      <p style="font-size:14px;margin-bottom:12px;">根据上面这 ${totalChecked} 条漏洞，匹配对应的<strong>7天专项练习</strong></p>
      <p style="font-size:13px;margin:8px 0;text-align:left;padding-left:16px;">
        📝 每天一页，精准对应每条漏铜<br>
        📖 答案单独成册，家长一目了然<br>
        🖨️ 直接打印，A4 纸就能用
      </p>
      <div style="font-size:28px;font-weight:800;color:#f39c12;margin:12px 0;">¥39</div>
      <div class="wechat-id">UFOceocoo</div>
      <br>
      <button class="copy-btn" onclick="copyText('UFOceocoo')">📋 复制微信号</button>
      <p style="font-size:12px;opacity:0.7;margin-top:8px;">转账后秒发 PDF · 立刻就能用</p>
    </div>
  `;

  $('#detailReportContainer').innerHTML = reportHTML;
  // Scroll to report
  $('#detailReportContainer').scrollIntoView({ behavior: 'smooth' });

}

function switchToDetailed() {
  state.tab = 'detailed';
  $$('#mainTabs .tab').forEach(t => t.classList.remove('active'));
  document.querySelector('#mainTabs .tab[data-tab="detailed"]').classList.add('active');
  $$('.section').forEach(s => s.classList.remove('active'));
  $('#section-detailed').classList.add('active');
  $('#detail-step1').classList.remove('hidden');
  if (state.detail.grade) {
    $('#detailKPContainer').classList.remove('hidden');
    renderDetailKP();
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
